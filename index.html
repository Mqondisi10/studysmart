<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySmart Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>StudySmart Hub</h1>
    <p>Your Online Textbook Store</p>
</header>

<nav>
    <input type="text" id="search" placeholder="Search books..." onkeyup="searchBooks()">
</nav>

<section id="books">
    <!-- Books will appear here -->
</section>

<section id="cart">
    <h2>Shopping Cart</h2>
    <ul id="cart-items"></ul>
    <button onclick="checkout()">Checkout</button>
</section>

<script src="script.js"></script>
</body>
</html>
